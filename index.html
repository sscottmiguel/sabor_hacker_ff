<!DOCTYPE html>
<html>
<head>
    <title>Sensi Free Fire PRO</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        select, button {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
        }

        button {
            background: lime;
            border: none;
            cursor: pointer;
        }

        #resultado {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>

</head>
<body>

<h1>🔥 SENSI FREE FIRE 🔥</h1>

<p>Escolha a marca:</p>
<select id="marca" onchange="carregarModelos()">
    <option value="">-- Escolha --</option>
    <option>Samsung</option>
    <option>Xiaomi</option>
    <option>Motorola</option>
    <option>LG</option>
    <option>iPhone</option>
</select>

<br>

<p>Escolha o modelo:</p>
<select id="modelo"></select>

<br>

<button onclick="mostrarSensi()">Ver Sensi 🔥</button>

<div id="resultado"></div>

<script>

let dados = {
    Samsung: ["A10","A12","A20","A32","A50","S20","S21","S22","S23"],
    Xiaomi: ["Redmi 7","Redmi Note 8","Redmi Note 9","Redmi Note 10","Redmi Note 11","Poco X3","Poco X5"],
    Motorola: ["G20","G30","G40","G60","Edge 20"],
    LG: ["K10","K22","K40","Velvet"],
    iPhone: ["8","X","11","12","13","14","15"]
};

function carregarModelos() {
    let marca = document.getElementById("marca").value;
    let modelo = document.getElementById("modelo");

    modelo.innerHTML = "";

    if (marca in dados) {
        dados[marca].forEach(m => {
            let option = document.createElement("option");
            option.text = marca + " " + m;
            modelo.add(option);
        });
    }
}

function mostrarSensi() {
    let modelo = document.getElementById("modelo").value;

    document.getElementById("resultado").innerHTML =
        "Sensi para: " + modelo + "<br><br>" +
        "Geral: 100<br>Red Dot: 90<br>Mira 2x: 80<br>Mira 4x: 70";
}

</script>

</body>
</html>
